<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Sunset Glow Gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f28c82"/>
      <stop offset="50%" style="stop-color:#fbaba4"/>
      <stop offset="100%" style="stop-color:#ffccd5"/>
    </linearGradient>
    
    <!-- Glass Highlight -->
    <linearGradient id="glass-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white; stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:white; stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:white; stop-opacity:0"/>
    </linearGradient>

    <!-- Subtle Blur Effect for Liquid Feel -->
    <filter id="liquid-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background Layer (Full fill for maskable) -->
  <rect width="100" height="100" fill="url(#sunset)"/>

  <!-- Liquid Glass Waves (Translucent blobs) -->
  <circle cx="30" cy="30" r="40" fill="white" fill-opacity="0.1" filter="url(#liquid-blur)"/>
  <circle cx="80" cy="70" r="35" fill="#f28c82" fill-opacity="0.3" filter="url(#liquid-blur)"/>

  <!-- Main Travel Icon (Stylized Paper Plane) -->
  <!-- Centered and scaled to 80% to fit within maskable safe-zone -->
  <g transform="translate(5, 5) scale(0.9)">
    <path d="M25 50 L75 25 L65 75 L55 55 Z" fill="white" fill-opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M55 55 L65 75 L75 25" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.5"/>
  </g>

  <!-- Glass Surface Shine -->
  <rect width="100" height="100" fill="url(#glass-shine)"/>
  
  <!-- Edge Highlight (Inner) -->
  <rect x="1" y="1" width="98" height="98" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
</svg>
